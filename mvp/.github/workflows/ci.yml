name: CI (MVP)
on:
  push:
    paths: ["mvp/**"]
  pull_request:
    paths: ["mvp/**"]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        working-directory: mvp
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Tests
        working-directory: mvp
        run: pytest -q
